name: Tizen CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/tizen/**'
      - 'packages/core/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/tizen/**'
      - 'packages/core/**'

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Lint
        run: npm run lint
        working-directory: apps/tizen

      - name: Run tests with coverage
        run: npx vitest run --coverage
        working-directory: apps/tizen

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/tizen/coverage/lcov.info
          flags: tizen
          name: tizen-coverage
          fail_ci_if_error: false

      - name: SonarQube Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Build Tizen app
        run: npm run build
        working-directory: apps/tizen
